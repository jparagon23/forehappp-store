spring.application.name=store
spring.config.import=env.properties
server.port=${PORT:8081}

# =====================
# DATABASE (shared con appointment)
# =====================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# =====================
# JPA
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =====================
# VIRTUAL THREADS
# =====================
spring.threads.virtual.enabled=true

# =====================
# CACHE (Caffeine)
# =====================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=300,expireAfterAccess=600s


# =====================
# JWT  — secret DISTINTO al de appointment
# =====================
store.jwt.secret=${STORE_JWT_SECRET}
access.token.validity.seconds=${ACCESS_TOKEN_EXPIRATION:86400}
refresh.token.validity.seconds=${REFRESH_TOKEN_EXPIRATION:604800}

# =====================
# PAYMENTS (MercadoPago)
# =====================
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN}
mercadopago.webhook.secret=${MERCADOPAGO_WEBHOOK_SECRET}
app.payment.currency=COP

# =====================
# EMAIL (MailerSend)
# =====================
mailersend.apiKey=${MAILERSEND_API_KEY}
mailersend.fromEmail=${MAILERSEND_FROM_EMAIL}
mailersend.fromName=${MAILERSEND_FROM_NAME:Forehapp Store}
app.email.provider=${EMAIL_PROVIDER:mock}

# =====================
# INTERNATIONALIZACION
# =====================
app.default-language=es
