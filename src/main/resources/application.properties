spring.application.name=store
spring.config.import=optional:env.properties
server.port=${PORT:8081}

# =====================
# DATABASE (shared con appointment)
# =====================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# =====================
# JPA
# =====================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:store-schema.sql
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# =====================
# VIRTUAL THREADS
# =====================
spring.threads.virtual.enabled=true

# =====================
# CACHE (Caffeine)
# =====================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=300,expireAfterAccess=600s


# =====================
# JWT  â€” secret DISTINTO al de appointment
# =====================
store.jwt.secret=${STORE_JWT_SECRET}
access.token.validity.seconds=${ACCESS_TOKEN_EXPIRATION:86400}
refresh.token.validity.seconds=${REFRESH_TOKEN_EXPIRATION:604800}

# =====================
# PAYMENTS (MercadoPago)
# =====================
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN}
mercadopago.webhook.secret=${MERCADOPAGO_WEBHOOK_SECRET}
app.payment.currency=COP
app.payment.back-url.success=${PAYMENT_SUCCESS_URL:http://localhost:3000/orders/success}
app.payment.back-url.failure=${PAYMENT_FAILURE_URL:http://localhost:3000/orders/failure}
app.payment.back-url.pending=${PAYMENT_PENDING_URL:http://localhost:3000/orders/pending}
app.payment.notification-url=${PAYMENT_NOTIFICATION_URL:}

# =====================
# INVENTORY ALERTS
# =====================
app.inventory.low-stock-threshold=${LOW_STOCK_THRESHOLD:5}

# =====================
# EMAIL (MailerSend)
# =====================
mailersend.apiKey=${MAILERSEND_API_KEY}
mailersend.fromEmail=${MAILERSEND_FROM_EMAIL}
mailersend.fromName=${MAILERSEND_FROM_NAME:Forehapp Store}
app.email.provider=${EMAIL_PROVIDER:mock}

# =====================
# PUSH (VAPID)
# =====================
push.vapid.publicKey=${VAPID_PUBLIC_KEY}
push.vapid.privateKey=${VAPID_PRIVATE_KEY}
push.vapid.subject=mailto:${MAILERSEND_FROM_EMAIL}

# =====================
# FCM
# =====================
fcm.service-account-json=${FCM_SERVICE_ACCOUNT_JSON:}

# =====================
# INTERNATIONALIZACION
# =====================
app.default-language=es

# =====================
# CORS
# =====================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# =====================
# MULTIPART
# =====================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# =====================
# STORAGE (S3 / R2)
# =====================
storage.bucket-name=${STORAGE_BUCKET_NAME:local-bucket}
storage.access-key=${STORAGE_ACCESS_KEY:local-key}
storage.secret-key=${STORAGE_SECRET_KEY:local-secret}
storage.endpoint=${STORAGE_ENDPOINT:}
storage.region=${STORAGE_REGION:us-east-1}
storage.public-url=${STORAGE_PUBLIC_URL:http://localhost}
